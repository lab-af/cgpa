<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator(Only FST)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1 class="heading">CGPA Calculator(Only FST)</h1>
        <label for="numCourses" class="heading-text"> Number of Courses</label>
        <input type="number" id="numCourses" min="1" class="box">

        <label for="totalCredits" class="heading-text"> Total Credits </label>
        <input type="number" id="totalCredits" min="1" placeholder="CURRENT SEMESTER" class="box">

        <button onclick="generateCourseInputs()" class=".btn-box">Next</button>

        <div id="coursesContainer"></div>

        <button onclick="calculateCGPA()">Calculate CGPA</button>

        <h3 id="result"></h3>
    </div>
    <footer>

        <h4 class="name"> Developed by <a href="https://www.facebook.com/lamubib0709">Labib</a> & <a
                href="https://www.facebook.com/partho.sarothi.ghosh.2005">Partho</a> </h4>
    </footer>

    <script src="script.js"></script>
</body>

</html>
