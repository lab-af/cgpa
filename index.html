<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>CGPA Calculator</h2>
        <label for="numCourses">Number of Courses:</label>
        <input type="number" id="numCourses" min="1">
        
        <label for="totalCredits">Total Semester Credits:</label>
        <input type="number" id="totalCredits" min="1">

        <button onclick="generateCourseInputs()">Next</button>

        <div id="coursesContainer"></div>

        <button onclick="calculateCGPA()">Calculate CGPA</button>

        <h3 id="result"></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
